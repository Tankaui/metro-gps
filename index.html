<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>步頻速度助手</title>
    <style>
        :root {
            /* 淺灰與淺綠色調定義 */
            --main-bg: #eeeeee;
            --card-bg: #ffffff;
            --text-main: #333333;
            --sub-text: #777777;
            --accent-green: #81c784;
            --border-color: #e0e0e0;
            --danger-text: #d93025;
        }

        /* 嚴格壓縮排版，禁止任何滑動 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background: var(--main-bg);
            margin: 0;
            padding: 8px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            padding-top: calc(8px + env(safe-area-inset-top));
            box-sizing: border-box;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            color: var(--text-main);
        }

        h1 { 
            font-size: 1.1em; 
            margin: 2px 0; 
            flex: 0 0 auto; 
            font-weight: 600;
        }

        .box {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
        }

        .label { font-size: 0.8em; color: var(--sub-text); margin-bottom: 2px; }

        .data {
            font-size: 2.2em;
            font-weight: 800;
            color: var(--text-main);
            margin: 2px 0;
            font-variant-numeric: tabular-nums;
        }

        .unit { font-size: 0.3em; margin-left: 2px; color: var(--accent-green); }

        .control-group {
            width: 100%;
            margin: 5px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button {
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: var(--border-color);
            color: var(--text-main);
            transition: transform 0.1s, background 0.2s;
            touch-action: manipulation;
            padding: 10px 20px;
        }

        button:active { transform: scale(0.95); background: #d0d0d0; }

        .btn-round {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.5em;
            padding: 0;
            flex-shrink: 0;
        }

        .btn-main { width: 100%; padding: 12px; margin-top: 2px; }
        
        .btn-active {
            background: var(--accent-green) !important;
            color: white !important;
        }
        
        .btn-lock { 
            background: var(--text-main);
            color: white;
            width: 100%; 
            padding: 15px; 
            flex: 0 0 auto;
            border-radius: 10px;
            margin: 0;
        }

        input {
            font-size: 1.8em;
            width: 80px;
            height: 45px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            color: var(--text-main);
            font-weight: bold;
        }

        #lockOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 20, 20, 0.96);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #unlockHint { margin-bottom: 20px; font-size: 1em; color: #aaaaaa; }
        
        #btnUnlock {
            width: 130px;
            height: 130px;
            border-radius: 65px;
            background: var(--text-main);
            border: 4px solid white;
            font-size: 1.2em;
            line-height: 1.3;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #unlockCountDown {
            font-size: 2.2em;
            font-weight: 800;
        }

        .status-text { font-size: 0.8em; color: var(--sub-text); margin-top: 5px; }
    </style>
</head>
<body>

    <h1>步頻速度助手</h1>

    <div class="box">
        <div class="label">目前時速</div>
        <div class="data" id="speedDisplay">0.0<span class="unit">km/h</span></div>
        <button id="btnStartGps" class="btn-main">開啟時速唸讀 (語音報數)</button>
        <p class="status-text" id="gpsStatus">唸讀功能未啟用</p>
    </div>

    <div class="box">
        <div class="label">步頻 (BPM)</div>
        <div class="control-group">
            <button class="btn-round" id="btnMinus">−</button>
            <input type="number" id="bpmInput" value="120" inputmode="numeric">
            <button class="btn-round" id="btnAdd">+</button>
        </div>
        <button id="btnToggleMetro" class="btn-main">開始打拍</button>
    </div>

    <button id="btnLock" class="btn-lock">螢幕休息 (鎖住)</button>

    <div id="lockOverlay">
        <p id="unlockHint">螢幕休息中，按住可以喚醒喔！</p>
        <button id="btnUnlock">
            按住喚醒
            <div id="unlockCountDown" style="display: none;"></div>
        </button>
    </div>

    <script>
        let watchId = null;
        let wakeLock = null;
        let lastThreshold = 0;
        let audioCtx, timerID = null, nextNoteTime = 0.0;
        
        const speedDisplay = document.getElementById('speedDisplay');
        const bpmInput = document.getElementById('bpmInput');
        const gpsStatus = document.getElementById('gpsStatus');

        function announceSpeed(speed) {
            const currentThreshold = Math.floor(speed / 5) * 5;
            if (currentThreshold > 0 && currentThreshold > lastThreshold) {
                const msg = new SpeechSynthesisUtterance(`時速 ${currentThreshold} 公里`);
                msg.lang = 'zh-TW';
                window.speechSynthesis.speak(msg);
                lastThreshold = currentThreshold;
            } else if (currentThreshold < lastThreshold) {
                lastThreshold = currentThreshold; 
            }
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.warn('無法啟動喚醒鎖');
            }
        }

        document.getElementById('btnStartGps').onclick = async (e) => {
            await requestWakeLock();
            if (watchId !== null) return;

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    let speedKmh = (pos.coords.speed || 0) * 3.6;
                    speedDisplay.innerHTML = `${speedKmh.toFixed(1)}<span class="unit">km/h</span>`;
                    announceSpeed(speedKmh);
                },
                (err) => { 
                    gpsStatus.textContent = "GPS 錯誤，請檢查權限";
                    gpsStatus.style.color = "var(--danger-text)";
                },
                { enableHighAccuracy: true }
            );
            
            e.target.textContent = "時速唸讀中";
            e.target.classList.add('btn-active');
            gpsStatus.textContent = "唸讀中 (每 5km/h)";
            gpsStatus.style.color = "var(--accent-green)";
        };

        function playNote(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 1000;
            gain.gain.setValueAtTime(1, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
            osc.start(time); osc.stop(time + 0.05);
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                playNote(nextNoteTime);
                nextNoteTime += 60.0 / parseInt(bpmInput.value);
            }
            timerID = setTimeout(scheduler, 25);
        }

        document.getElementById('btnToggleMetro').onclick = (e) => {
            document.activeElement.blur(); 
            
            if (!audioCtx) audioCtx = new AudioContext();
            if (timerID) {
                clearTimeout(timerID); timerID = null;
                e.target.textContent = "開始打拍";
                e.target.classList.remove('btn-active');
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                nextNoteTime = audioCtx.currentTime;
                scheduler();
                e.target.textContent = "停止打拍";
                e.target.classList.add('btn-active');
            }
        };

        function validateBPM() {
            let val = parseInt(bpmInput.value);
            if (isNaN(val)) val = 120;
            if (val < 40) val = 40;
            if (val > 300) val = 300;
            bpmInput.value = val;
        }
        bpmInput.addEventListener('change', validateBPM);
        bpmInput.addEventListener('blur', validateBPM);

        document.getElementById('btnAdd').onclick = () => {
            bpmInput.value = Math.min(300, parseInt(bpmInput.value) + 1);
        };
        document.getElementById('btnMinus').onclick = () => {
            bpmInput.value = Math.max(40, parseInt(bpmInput.value) - 1);
        };

        const lockBtn = document.getElementById('btnLock');
        const lockOverlay = document.getElementById('lockOverlay');
        const unlockBtn = document.getElementById('btnUnlock');
        const unlockCountDown = document.getElementById('unlockCountDown');
        
        let unlockTimer;
        let countdownInterval;
        let timeLeft = 2;

        lockBtn.onclick = () => {
            document.activeElement.blur();
            lockOverlay.style.display = 'flex';
        };

        const startUnlock = (e) => {
            e.preventDefault();
            timeLeft = 2;
            
            unlockCountDown.style.display = 'block';
            unlockBtn.innerHTML = `唤醒...<div id="unlockCountDown">${timeLeft}</div>`;
            unlockBtn.style.background = 'var(--accent-green)'; 
            
            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    unlockBtn.innerHTML = `唤醒...<div id="unlockCountDown">${timeLeft}</div>`;
                }
            }, 1000);

            unlockTimer = setTimeout(() => {
                clearInterval(countdownInterval);
                lockOverlay.style.display = 'none';
                resetUnlockBtn();
            }, 2000);
        };

        const cancelUnlock = () => {
            clearTimeout(unlockTimer);
            clearInterval(countdownInterval);
            resetUnlockBtn();
        };

        function resetUnlockBtn() {
            unlockBtn.innerHTML = "按住喚醒";
            unlockBtn.style.background = 'var(--text-main)'; 
        }

        unlockBtn.addEventListener('mousedown', startUnlock);
        unlockBtn.addEventListener('touchstart', startUnlock);
        
        unlockBtn.addEventListener('mouseup', cancelUnlock);
        unlockBtn.addEventListener('touchend', cancelUnlock);
        unlockBtn.addEventListener('mouseleave', cancelUnlock);

    </script>
</body>
</html>
