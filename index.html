<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>步頻速度助手</title>
    <style>
        :root {
            --main-bg: #eeeeee;
            --card-bg: #ffffff;
            --text-main: #333333;
            --sub-text: #777777;
            --accent-green: #81c784;
            --border-color: #e0e0e0;
            --danger-text: #d93025;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background: var(--main-bg);
            margin: 0;
            padding: 12px; 
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); 
            padding-top: calc(12px + env(safe-area-inset-top)); 
            box-sizing: border-box;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            gap: 10px; 
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            color: var(--text-main);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5px;
            box-sizing: border-box;
            flex: 0 0 auto;
        }

        h1 { font-size: 1.4em; margin: 0; font-weight: 700; }

        .btn-refresh {
            background: transparent;
            color: var(--sub-text);
            font-size: 0.9em;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
        }

        .box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1; 
            min-height: 0; 
        }

        .label { font-size: 1.1em; color: var(--sub-text); margin-bottom: 5px; }

        .data {
            font-size: 4.5em; 
            font-weight: 800;
            color: var(--text-main);
            margin: 5px 0;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .unit { font-size: 0.3em; margin-left: 2px; color: var(--accent-green); }

        .sub-stats {
            font-size: 1.2em;
            color: var(--sub-text);
            margin-bottom: 15px;
        }
        .stat-highlight { color: var(--text-main); font-weight: bold; }

        .control-group {
            width: 100%;
            margin: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button {
            font-size: 1.1em; 
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: var(--border-color); 
            color: var(--text-main);
            transition: transform 0.1s;
        }

        .btn-round {
            width: 60px; height: 60px; border-radius: 50%;
            font-size: 2em; display: flex; justify-content: center; align-items: center;
        }

        .btn-main { width: 100%; padding: 18px; margin-top: 5px; }
        .btn-active { background: var(--accent-green) !important; color: white !important; }
        
        .btn-lock { 
            background: var(--text-main); 
            color: white;
            width: 100%; 
            padding: 20px; 
            flex: 0 0 auto;
            border-radius: 12px;
        }

        input {
            font-size: 2.2em; 
            width: 100px;
            height: 60px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: #fff;
            color: var(--text-main);
            font-weight: bold;
        }

        #lockOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.96); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        #btnUnlock { width: 160px; height: 160px; border-radius: 80px; background: var(--text-main); border: 4px solid white; font-size: 1.4em; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .status-text { font-size: 0.9em; color: var(--sub-text); margin-top: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>步頻速度助手</h1>
        <button class="btn-refresh" id="btnRefresh">數據歸零</button>
    </div>

    <div class="box">
        <div class="label">目前時速</div>
        <div class="data" id="speedDisplay">0.0<span class="unit">km/h</span></div>
        
        <div class="sub-stats">
            累計里程: <span class="stat-highlight" id="distDisplay">0.00</span> km
        </div>

        <button id="btnToggleGps" class="btn-main">啟動測速與里程</button>
        <p class="status-text" id="gpsStatus">測速未啟動</p>
    </div>

    <div class="box">
        <div class="label">步頻 (BPM)</div>
        <div class="control-group">
            <button class="btn-round" id="btnMinus">−</button>
            <input type="number" id="bpmInput" value="120" inputmode="numeric">
            <button class="btn-round" id="btnAdd">+</button>
        </div>
        <button id="btnToggleMetro" class="btn-main">開始打拍</button>
    </div>

    <button id="btnLock" class="btn-lock">螢幕休息 (鎖定)</button>

    <div id="lockOverlay">
        <p>螢幕休息中，按住喚醒</p>
        <button id="btnUnlock">按住喚醒</button>
    </div>

    <script>
        let watchId = null, wakeLock = null, lastThreshold = 0;
        let audioCtx, timerID = null, nextNoteTime = 0.0;
        
        // 里程數據變數
        let totalDistance = parseFloat(localStorage.getItem('simpleSavedDist')) || 0;
        let lastPosition = null;

        const speedDisplay = document.getElementById('speedDisplay');
        const distDisplay = document.getElementById('distDisplay');
        const bpmInput = document.getElementById('bpmInput');
        const gpsStatus = document.getElementById('gpsStatus');

        // 初始化里程顯示
        distDisplay.textContent = totalDistance.toFixed(2);

        // --- 歸零功能 ---
        document.getElementById('btnRefresh').onclick = () => {
            if(confirm("確定要將里程歸零嗎？")) {
                totalDistance = 0;
                localStorage.removeItem('simpleSavedDist');
                distDisplay.textContent = "0.00";
                speedDisplay.innerHTML = `0.0<span class="unit">km/h</span>`;
            }
        };

        // --- Haversine 公式計算里程 ---
        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator && !wakeLock) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        }

        // --- GPS 邏輯 ---
        document.getElementById('btnToggleGps').onclick = async (e) => {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null; lastPosition = null;
                e.target.textContent = "啟動測速與里程";
                e.target.classList.remove('btn-active');
                gpsStatus.textContent = "測速已停止";
                gpsStatus.style.color = "var(--sub-text)";
            } else {
                await requestWakeLock();
                watchId = navigator.geolocation.watchPosition((pos) => {
                    let speedKmh = (pos.coords.speed || 0) * 3.6;
                    const lat = pos.coords.latitude, lon = pos.coords.longitude;

                    if (lastPosition && speedKmh > 1.5) {
                        const d = calcDistance(lastPosition.lat, lastPosition.lon, lat, lon);
                        totalDistance += d;
                        localStorage.setItem('simpleSavedDist', totalDistance);
                    }
                    lastPosition = { lat, lon };
                    
                    speedDisplay.innerHTML = `${speedKmh.toFixed(1)}<span class="unit">km/h</span>`;
                    distDisplay.textContent = totalDistance.toFixed(2);
                }, null, { enableHighAccuracy: true });
                
                e.target.textContent = "停止測速";
                e.target.classList.add('btn-active');
                gpsStatus.textContent = "測速監測中";
                gpsStatus.style.color = "var(--accent-green)";
            }
        };

        // --- 節拍器與鎖定邏輯 ---
        document.getElementById('btnToggleMetro').onclick = async (e) => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (timerID) {
                clearTimeout(timerID); timerID = null;
                e.target.textContent = "開始打拍"; e.target.classList.remove('btn-active');
            } else {
                await requestWakeLock();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                nextNoteTime = audioCtx.currentTime;
                const scheduler = () => {
                    while (nextNoteTime < audioCtx.currentTime + 0.1) {
                        const osc = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        osc.connect(g); g.connect(audioCtx.destination);
                        g.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.05);
                        osc.start(nextNoteTime); osc.stop(nextNoteTime + 0.05);
                        nextNoteTime += 60.0 / parseInt(bpmInput.value);
                    }
                    timerID = setTimeout(scheduler, 25);
                };
                scheduler();
                e.target.textContent = "停止打拍"; e.target.classList.add('btn-active');
            }
        };

        document.getElementById('btnAdd').onclick = () => bpmInput.value = parseInt(bpmInput.value) + 1;
        document.getElementById('btnMinus').onclick = () => bpmInput.value = Math.max(40, bpmInput.value - 1);
        document.getElementById('btnLock').onclick = () => document.getElementById('lockOverlay').style.display = 'flex';
        
        let unlockTimer;
        document.getElementById('btnUnlock').addEventListener('touchstart', (e) => {
            e.preventDefault();
            unlockTimer = setTimeout(() => {
                document.getElementById('lockOverlay').style.display = 'none';
            }, 1500);
        });
        document.getElementById('btnUnlock').addEventListener('touchend', () => clearTimeout(unlockTimer));
    </script>
</body>
</html>
