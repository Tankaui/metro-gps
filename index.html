<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>步頻速度助手</title>
    <style>
        :root {
            --main-bg: #eeeeee;
            --card-bg: #ffffff;
            --text-main: #333333;
            --sub-text: #777777;
            --accent-green: #81c784;
            --accent-blue: #4ba3e3;
            --border-color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background: var(--main-bg);
            margin: 0 auto;
            padding: 8px;
            width: 100%;
            max-width: 400px;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            color: var(--text-main);
            box-sizing: border-box;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            padding-top: calc(8px + env(safe-area-inset-top));
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5px;
            flex: 0 0 auto;
        }

        h1 { font-size: 1.3em; margin: 0; font-weight: 700; }
        
        .version-text { font-size: 0.6em; font-weight: normal; color: var(--sub-text); margin-left: 4px; }

        .box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
        }

        .speed-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .label-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .label { font-size: 1em; color: var(--sub-text); }

        .mode-toggle {
            font-size: 0.8em;
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--border-color);
            border: none;
            color: var(--text-main);
            font-weight: bold;
        }

        .mode-toggle.active {
            background: var(--accent-blue);
            color: white;
        }

        .data {
            font-size: clamp(3.5em, 16vw, 5em); 
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .unit { font-size: 0.25em; margin-left: 2px; color: var(--accent-green); }

        .sub-stats { font-size: 1.1em; color: var(--sub-text); margin-bottom: 5px; }
        .stat-highlight { color: var(--text-main); font-weight: bold; }

        .control-group {
            width: 100%;
            margin: 5px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button {
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: var(--border-color);
            color: var(--text-main);
            transition: transform 0.1s;
        }

        .btn-round {
            width: 55px; height: 55px; border-radius: 50%;
            font-size: 2em; display: flex; justify-content: center; align-items: center;
        }

        .btn-main { width: 100%; padding: 15px; margin-top: 5px; }
        .btn-active { background: var(--accent-green) !important; color: white !important; }

        .btn-lock {
            background: var(--text-main);
            color: white;
            width: 100%;
            padding: 16px;
            flex: 0 0 auto;
            border-radius: 12px;
        }

        input[type="number"] {
            font-size: 2em;
            width: 100px;
            height: 55px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: #fff;
            color: var(--text-main);
            font-weight: bold;
        }

        input[type="range"] {
            width: 85%;
            margin: 5px 0 10px 0;
        }

        .freq-label {
            font-size: 0.85em;
            color: var(--sub-text);
            margin-top: 5px;
        }

        #lockOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.98); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #lockSpeedDisplay {
            font-size: clamp(4.5em, 22vw, 7.5em) !important;
            font-weight: 800; color: white; margin-bottom: 40px; line-height: 1; font-variant-numeric: tabular-nums;
        }

        #btnUnlock { 
            position: relative;
            overflow: hidden;
            width: 160px; height: 160px; border-radius: 80px; 
            background: var(--text-main); border: 4px solid white; 
            font-size: 1.4em; color: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            -webkit-touch-callout: none;
            touch-action: none;
        }

        #btnUnlock::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 0%;
            background: var(--accent-green);
            z-index: 0;
            transition: none;
        }

        #btnUnlock.holding::before {
            height: 100%;
            transition: height 1.5s linear;
        }

        #btnUnlock span {
            position: relative;
            z-index: 1;
            pointer-events: none;
        }

        @media (max-height: 700px) {
            .label-row { margin-bottom: 12px; }
            .btn-main { padding: 12px; margin-top: 2px; }
            .btn-lock { padding: 12px; }
            .box { padding: 8px; }
            input[type="number"] { height: 45px; font-size: 1.8em; }
            .btn-round { width: 45px; height: 45px; font-size: 1.8em; }
            #btnUnlock { width: 130px; height: 130px; border-radius: 65px; font-size: 1.2em; }
            #lockSpeedDisplay { margin-bottom: 25px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>步頻助手<span class="version-text">v30.0.5</span></h1>
    </div>

    <div class="box">
        <div class="speed-wrapper">
            <div class="label">目前時速</div>
            <div class="data" id="speedDisplay" style="margin-bottom: 10px;">0.0<span class="unit">km/h</span></div>
        </div>
        <div class="freq-label" id="sysWarning" style="margin-bottom: 8px; line-height: 1.3;">⚠️ 網頁版 GPS 易受干擾，此工具僅做為簡易參考。<br>請保持螢幕長亮，勿退至背景或鎖定設備。</div>
        <button id="btnToggleGps" class="btn-main">啟動測速與種花超速提示</button>
    </div>

    <div class="box">
        <div class="label-row">
            <span class="label" id="metroLabel">一般節拍器 (BPM)</span>
            <button class="mode-toggle" id="btnModeToggle">切換自行車踏頻</button>
        </div>
        <div class="control-group">
            <button class="btn-round" id="btnMinus">−</button>
            <input type="number" id="bpmInput" value="120" inputmode="numeric" min="10">
            <button class="btn-round" id="btnAdd">+</button>
        </div>
        
        <div class="freq-label">音高設定: <span id="freqDisplay" class="stat-highlight">880</span> Hz</div>
        <input type="range" id="freqSlider" min="200" max="2000" step="10" value="880">

        <button id="btnToggleMetro" class="btn-main">開始打拍</button>
    </div>

    <button id="btnLock" class="btn-lock">啟用螢幕鎖定防誤觸</button>

    <div id="lockOverlay" oncontextmenu="return false;">
        <div id="lockSpeedDisplay">0.0<span style="font-size: 0.25em; color: var(--accent-green); margin-left: 5px;">km/h</span></div>
        <p style="color: var(--sub-text); margin-bottom: 15px;">鎖定中，按住圓圈</p>
        <button id="btnUnlock" oncontextmenu="return false;"><span>按住喚醒</span></button>
    </div>

    <script>
        // --- 卡爾曼濾波器 (1D 速度平滑) ---
        class KalmanFilter {
            constructor() {
                this.R = 5; 
                this.Q = 1; 
                this.x = NaN; 
                this.P = 1; 
            }
            filter(measurement) {
                if (isNaN(this.x)) {
                    this.x = measurement;
                } else {
                    this.P = this.P + this.Q;
                    let K = this.P / (this.P + this.R);
                    this.x = this.x + K * (measurement - this.x);
                    this.P = (1 - K) * this.P;
                }
                return this.x;
            }
            reset() {
                this.x = NaN;
                this.P = 1;
            }
        }

        const speedKalman = new KalmanFilter();

        let watchId = null, wakeLock = null;
        let audioCtx, timerID = null, nextNoteTime = 0.0;
        let lastPosition = null;
        let lastValidTime = 0;
        let isOverSpeed = false; 
        let isBikeMode = false;
        let isAppActive = false; 
        let wakeLockAlerted = false; 
        
        // --- 新增狀態管理變數 ---
        let currentInternalBpm = 120; // 統一底層 BPM 真值
        let gpsWatchdogTimer = null; // GPS 假死偵測計時器

        let motionLevel = 0; 

        const speedDisplay = document.getElementById('speedDisplay');
        const lockSpeedDisplay = document.getElementById('lockSpeedDisplay');
        const bpmInput = document.getElementById('bpmInput');
        const metroLabel = document.getElementById('metroLabel');
        const btnModeToggle = document.getElementById('btnModeToggle');
        const freqSlider = document.getElementById('freqSlider');
        const freqDisplay = document.getElementById('freqDisplay');

        // --- BPM 顯示與同步邏輯 ---
        function updateBpmDisplay() {
            bpmInput.value = isBikeMode ? Math.round(currentInternalBpm / 2) : currentInternalBpm;
        }

        bpmInput.addEventListener('focus', (e) => setTimeout(() => e.target.select(), 10));
        bpmInput.addEventListener('click', (e) => setTimeout(() => e.target.select(), 10));
        
        bpmInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (isNaN(val) || val < 10) val = isBikeMode ? 10 : 20;
            currentInternalBpm = isBikeMode ? val * 2 : val;
            updateBpmDisplay();
        });

        freqSlider.addEventListener('input', (e) => {
            freqDisplay.textContent = e.target.value;
        });

        window.addEventListener('devicemotion', (e) => {
            let acc = e.acceleration; 
            if (acc) {
                let mag = Math.sqrt((acc.x || 0)**2 + (acc.y || 0)**2 + (acc.z || 0)**2);
                motionLevel = motionLevel * 0.8 + mag * 0.2; 
            }
        });

        // --- WakeLock 獲取與防護機制 ---
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    if (wakeLock !== null) {
                        await wakeLock.release();
                        wakeLock = null;
                    }
                    wakeLock = await navigator.wakeLock.request('screen');
                    
                    // 監聽意外釋放，嘗試重啟
                    wakeLock.addEventListener('release', () => {
                        if (isAppActive && document.visibilityState === 'visible') {
                            requestWakeLock();
                        }
                    });

                } catch (err) {
                    console.warn('Wake Lock 失敗:', err);
                    if (!wakeLockAlerted) {
                        alert("系統提示：\n無法自動保持螢幕常亮 (可能為省電模式或權限限制)。\n為避免中途黑屏，請手動至手機設定延長休眠時間。");
                        wakeLockAlerted = true;
                    }
                    document.getElementById('sysWarning').innerHTML = '⚠️ 網頁版 GPS 易受干擾。<br><span style="color:#e53935; font-weight:bold;">常亮失效！請手動設定手機不休眠。</span>';
                }
            } else if (!wakeLockAlerted) {
                alert("系統提示：\n您的瀏覽器不支援自動螢幕常亮功能。\n為避免中途黑屏，請手動至手機設定延長休眠時間。");
                wakeLockAlerted = true;
            }
        }

        function checkAppStatus() {
            if (!watchId && !timerID) {
                isAppActive = false;
                if (wakeLock !== null) {
                    wakeLock.release().catch(()=>{});
                    wakeLock = null;
                }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && isAppActive) {
                await requestWakeLock();
            }
        });

        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.001);
        }

        function playBeeps(frequency, duration, repeat, interval) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let startTime = audioCtx.currentTime + 0.05;
            for (let i = 0; i < repeat; i++) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();

                osc.type = 'square';
                osc.frequency.setValueAtTime(frequency, startTime);
                g.gain.setValueAtTime(1, startTime);
                g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

                osc.connect(g);
                g.connect(audioCtx.destination);
                
                osc.start(startTime);
                osc.stop(startTime + duration);
                startTime += interval;
            }
        }

        function announceSpeed(speed) {
            if (speed >= 20 && !isOverSpeed) {
                playBeeps(1200, 0.05, 5, 0.1); 
                isOverSpeed = true;
            } else if (speed <= 19 && isOverSpeed) {
                playBeeps(300, 0.5, 1, 0); 
                isOverSpeed = false;
            }
        }

        function updateSpeedUI(speedKmh) {
            let displaySpeed = Math.max(0, speedKmh).toFixed(1);
            speedDisplay.innerHTML = `${displaySpeed}<span class="unit">km/h</span>`;
            lockSpeedDisplay.innerHTML = `${displaySpeed}<span style="font-size: 0.25em; color: var(--accent-green); margin-left: 5px;">km/h</span>`;
        }

        btnModeToggle.onclick = () => {
            isBikeMode = !isBikeMode;
            btnModeToggle.classList.toggle('active', isBikeMode);
            if (isBikeMode) {
                metroLabel.textContent = "自行車踏頻 (RPM)";
                btnModeToggle.textContent = "切換一般節拍器";
            } else {
                metroLabel.textContent = "一般節拍器 (BPM)";
                btnModeToggle.textContent = "切換自行車踏頻";
            }
            updateBpmDisplay();
        };

        // --- GPS Watchdog 與重啟邏輯 ---
        function startGpsWatchdog() {
            clearTimeout(gpsWatchdogTimer);
            gpsWatchdogTimer = setTimeout(() => {
                // 如果裝置有在搖晃，且 APP 運作中卻 12 秒沒收到 GPS 更新，自動重啟
                if (isAppActive && watchId && motionLevel > 0.1) {
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    startGeolocation();
                }
            }, 12000);
        }

        function startGeolocation() {
            watchId = navigator.geolocation.watchPosition((pos) => {
                startGpsWatchdog(); // 收到訊號就重置看門狗
                
                const currentAcc = pos.coords.accuracy;
                const currentTime = pos.timestamp;

                if (motionLevel < 0.1) {
                    speedKalman.reset(); 
                    updateSpeedUI(0);
                    return;
                }

                if (currentAcc > 25) return;
                if (lastValidTime && (currentTime - lastValidTime < 800)) return;

                let rawSpeedKmh = (pos.coords.speed || 0) * 3.6;

                if (lastPosition) {
                    const R = 6371;
                    const dLat = (pos.coords.latitude - lastPosition.lat) * Math.PI / 180;
                    const dLon = (pos.coords.longitude - lastPosition.lon) * Math.PI / 180;
                    const a = Math.sin(dLat/2)**2 + Math.cos(lastPosition.lat * Math.PI / 180) * Math.cos(pos.coords.latitude * Math.PI / 180) * Math.sin(dLon/2)**2;
                    const distance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 

                    const timeDiffSec = (currentTime - lastValidTime) / 1000;
                    const calcSpeedKmh = (distance / timeDiffSec) * 3600;

                    if (distance > 0.002 && calcSpeedKmh < 80) {
                        if (!pos.coords.speed && timeDiffSec > 0) rawSpeedKmh = calcSpeedKmh;
                        lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                        lastValidTime = currentTime;
                    }
                } else {
                    lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    lastValidTime = currentTime;
                }

                let filteredSpeedKmh = speedKalman.filter(rawSpeedKmh);
                
                if (filteredSpeedKmh < 1.0 && rawSpeedKmh < 0.5) {
                    filteredSpeedKmh = 0;
                    speedKalman.reset();
                }

                announceSpeed(filteredSpeedKmh);
                updateSpeedUI(filteredSpeedKmh);
                
            }, (error) => {
                console.warn("GPS 異常:", error.message);
            }, { 
                enableHighAccuracy: true, 
                maximumAge: 0, 
                timeout: 5000 
            });
        }

        document.getElementById('btnToggleGps').onclick = async (e) => {
            unlockAudio();

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState !== 'granted') console.warn('物理感測器權限未核准');
                } catch (err) { console.warn('無法請求感測器權限', err); }
            }

            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                clearTimeout(gpsWatchdogTimer);
                watchId = null; 
                lastPosition = null; 
                lastValidTime = 0;
                isOverSpeed = false; 
                speedKalman.reset(); 
                
                e.target.textContent = "啟動測速與種花超速提示";
                e.target.classList.remove('btn-active');
                checkAppStatus(); 
            } else {
                window.alert("系統提示：\n當時速達到 20 km/h 時將發出高音警報。\n降回 19 km/h 時將發出低音解除警報。");
                isAppActive = true;
                await requestWakeLock(); 
                speedKalman.reset();
                startGeolocation();
                
                e.target.textContent = "停止測速";
                e.target.classList.add('btn-active');
            }
        };

        document.getElementById('btnToggleMetro').onclick = async (e) => {
            unlockAudio();

            if (timerID) {
                clearTimeout(timerID); timerID = null;
                e.target.textContent = "開始打拍"; e.target.classList.remove('btn-active');
                checkAppStatus(); 
            } else {
                isAppActive = true;
                await requestWakeLock(); 
                
                nextNoteTime = audioCtx.currentTime;
                
                const scheduler = () => {
                    if (nextNoteTime < audioCtx.currentTime) {
                        nextNoteTime = audioCtx.currentTime + 0.05;
                    }

                    while (nextNoteTime < audioCtx.currentTime + 0.1) {
                        const osc = audioCtx.createOscillator();
                        const g = audioCtx.createGain();

                        osc.type = 'square'; 
                        const currentFreq = parseInt(freqSlider.value);
                        osc.frequency.setValueAtTime(currentFreq, nextNoteTime); 

                        g.gain.setValueAtTime(1, nextNoteTime);
                        g.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.05);

                        osc.connect(g); 
                        g.connect(audioCtx.destination);
                        
                        osc.start(nextNoteTime); 
                        osc.stop(nextNoteTime + 0.05);
                        
                        // 使用底層的統一 BPM 來計算，不依賴 UI 數值
                        nextNoteTime += 60.0 / currentInternalBpm;
                    }
                    timerID = setTimeout(scheduler, 25);
                };
                scheduler();
                e.target.textContent = "停止打拍"; e.target.classList.add('btn-active');
            }
        };

        document.getElementById('btnAdd').onclick = () => {
            currentInternalBpm += isBikeMode ? 2 : 1;
            updateBpmDisplay();
        };
        document.getElementById('btnMinus').onclick = () => {
            currentInternalBpm -= isBikeMode ? 2 : 1;
            if(currentInternalBpm < 20) currentInternalBpm = 20;
            updateBpmDisplay();
        };
        
        document.getElementById('btnLock').onclick = () => document.getElementById('lockOverlay').style.display = 'flex';
        
        let unlockTimer;
        const btnUnlock = document.getElementById('btnUnlock');
        const btnUnlockText = btnUnlock.querySelector('span');

        btnUnlock.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            btnUnlock.classList.add('holding');
            btnUnlockText.textContent = "解鎖中...";
            unlockTimer = setTimeout(() => { 
                document.getElementById('lockOverlay').style.display = 'none'; 
                btnUnlock.classList.remove('holding');
                btnUnlockText.textContent = "按住喚醒";
            }, 1500);
        }, { passive: false });

        const cancelUnlock = (e) => {
            if(e && e.cancelable) e.preventDefault();
            clearTimeout(unlockTimer);
            btnUnlock.classList.remove('holding');
            btnUnlockText.textContent = "按住喚醒";
        };

        btnUnlock.addEventListener('touchend', cancelUnlock, { passive: false });
        btnUnlock.addEventListener('touchcancel', cancelUnlock, { passive: false });

        btnUnlock.addEventListener('mousedown', (e) => {
            btnUnlock.classList.add('holding');
            btnUnlockText.textContent = "解鎖中...";
            unlockTimer = setTimeout(() => { 
                document.getElementById('lockOverlay').style.display = 'none'; 
                btnUnlock.classList.remove('holding');
                btnUnlockText.textContent = "按住喚醒";
            }, 1500);
        });
        btnUnlock.addEventListener('mouseup', cancelUnlock);
        btnUnlock.addEventListener('mouseleave', cancelUnlock);

    </script>
</body>
</html>
