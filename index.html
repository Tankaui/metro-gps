<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>步頻速度助手</title>
    <style>
        :root {
            --main-bg: #eeeeee;
            --card-bg: #ffffff;
            --text-main: #333333;
            --sub-text: #777777;
            --accent-green: #81c784;
            --accent-blue: #4ba3e3;
            --border-color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background: var(--main-bg);
            margin: 0;
            padding: 12px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            padding-top: calc(12px + env(safe-area-inset-top));
            box-sizing: border-box;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            color: var(--text-main);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5px;
            flex: 0 0 auto;
        }

        h1 { font-size: 1.4em; margin: 0; font-weight: 700; }

        .btn-refresh {
            background: transparent;
            color: var(--sub-text);
            font-size: 0.9em;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
        }

        .box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
        }

        .label-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .label { font-size: 1.1em; color: var(--sub-text); }

        .mode-toggle {
            font-size: 0.8em;
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--border-color);
            border: none;
            color: var(--text-main);
            font-weight: bold;
        }

        .mode-toggle.active {
            background: var(--accent-blue);
            color: white;
        }

        .data {
            font-size: 4.5em;
            font-weight: 800;
            color: var(--text-main);
            margin: 5px 0;
            line-height: 1;
        }

        .unit { font-size: 0.3em; margin-left: 2px; color: var(--accent-green); }

        .sub-stats { font-size: 1.2em; color: var(--sub-text); margin-bottom: 15px; }
        .stat-highlight { color: var(--text-main); font-weight: bold; }

        .control-group {
            width: 100%;
            margin: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button {
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: var(--border-color);
            color: var(--text-main);
            transition: transform 0.1s;
        }

        .btn-round {
            width: 60px; height: 60px; border-radius: 50%;
            font-size: 2em; display: flex; justify-content: center; align-items: center;
        }

        .btn-main { width: 100%; padding: 18px; margin-top: 5px; }
        .btn-active { background: var(--accent-green) !important; color: white !important; }

        .btn-lock {
            background: var(--text-main);
            color: white;
            width: 100%;
            padding: 20px;
            flex: 0 0 auto;
            border-radius: 12px;
        }

        input {
            font-size: 2.2em;
            width: 110px;
            height: 60px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: #fff;
            color: var(--text-main);
            font-weight: bold;
        }

        #lockOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.96); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        #btnUnlock { width: 160px; height: 160px; border-radius: 80px; background: var(--text-main); border: 4px solid white; font-size: 1.4em; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>步頻助手</h1>
        <button class="btn-refresh" id="btnRefresh">歸零</button>
    </div>

    <div class="box">
        <div class="label">目前時速</div>
        <div class="data" id="speedDisplay">0.0<span class="unit">km/h</span></div>
        <div class="sub-stats">里程: <span class="stat-highlight" id="distDisplay">0.00</span> km</div>
        <button id="btnToggleGps" class="btn-main">啟動測速與雙向報數</button>
    </div>

    <div class="box">
        <div class="label-row">
            <span class="label" id="metroLabel">一般步頻 (BPM)</span>
            <button class="mode-toggle" id="btnModeToggle">切換自行車</button>
        </div>
        <div class="control-group">
            <button class="btn-round" id="btnMinus">−</button>
            <input type="number" id="bpmInput" value="120" inputmode="numeric">
            <button class="btn-round" id="btnAdd">+</button>
        </div>
        <button id="btnToggleMetro" class="btn-main">開始打拍</button>
    </div>

    <button id="btnLock" class="btn-lock">螢幕休息 (鎖定)</button>

    <div id="lockOverlay">
        <p>鎖定中，按住喚醒</p>
        <button id="btnUnlock">按住喚醒</button>
    </div>

    <script>
        let watchId = null, wakeLock = null;
        let audioCtx, timerID = null, nextNoteTime = 0.0;
        let totalDistance = parseFloat(localStorage.getItem('simpleSavedDist')) || 0;
        let lastPosition = null;
        let lastThreshold = -1; 
        
        let isBikeMode = false;

        const speedDisplay = document.getElementById('speedDisplay');
        const distDisplay = document.getElementById('distDisplay');
        const bpmInput = document.getElementById('bpmInput');
        const metroLabel = document.getElementById('metroLabel');
        const btnModeToggle = document.getElementById('btnModeToggle');

        distDisplay.textContent = totalDistance.toFixed(2);

        function announceSpeed(speed) {
            const currentThreshold = Math.floor(speed / 5) * 5;
            
            if (currentThreshold !== lastThreshold) {
                if (currentThreshold >= 5) {
                    const msg = new SpeechSynthesisUtterance(`時速 ${currentThreshold} 公里`);
                    msg.lang = 'zh-TW';
                    window.speechSynthesis.speak(msg);
                } else if (currentThreshold === 0 && lastThreshold !== -1) {
                    const msg = new SpeechSynthesisUtterance(`時速低於 5 公里`);
                    msg.lang = 'zh-TW';
                    window.speechSynthesis.speak(msg);
                }
                lastThreshold = currentThreshold;
            }
        }

        btnModeToggle.onclick = () => {
            isBikeMode = !isBikeMode;
            btnModeToggle.classList.toggle('active', isBikeMode);
            if (isBikeMode) {
                metroLabel.textContent = "自行車踏頻 (RPM)";
                btnModeToggle.textContent = "切換一般";
                bpmInput.value = Math.round(parseInt(bpmInput.value) / 2);
            } else {
                metroLabel.textContent = "一般步頻 (BPM)";
                btnModeToggle.textContent = "切換自行車";
                bpmInput.value = Math.round(parseInt(bpmInput.value) * 2);
            }
        };

        document.getElementById('btnRefresh').onclick = () => {
            if(confirm("歸零里程？")) {
                totalDistance = 0;
                localStorage.removeItem('simpleSavedDist');
                distDisplay.textContent = "0.00";
            }
        };

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator && !wakeLock) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        }

        document.getElementById('btnToggleGps').onclick = async (e) => {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null; lastPosition = null; lastThreshold = -1;
                e.target.textContent = "啟動測速與雙向報數";
                e.target.classList.remove('btn-active');
            } else {
                await requestWakeLock();
                watchId = navigator.geolocation.watchPosition((pos) => {
                    let speedKmh = (pos.coords.speed || 0) * 3.6;
                    
                    announceSpeed(speedKmh);

                    if (lastPosition && speedKmh > 1.5) {
                        const R = 6371;
                        const dLat = (pos.coords.latitude - lastPosition.lat) * Math.PI / 180;
                        const dLon = (pos.coords.longitude - lastPosition.lon) * Math.PI / 180;
                        const a = Math.sin(dLat/2)**2 + Math.cos(lastPosition.lat * Math.PI / 180) * Math.cos(pos.coords.latitude * Math.PI / 180) * Math.sin(dLon/2)**2;
                        totalDistance += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        localStorage.setItem('simpleSavedDist', totalDistance);
                    }
                    lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    speedDisplay.innerHTML = `${speedKmh.toFixed(1)}<span class="unit">km/h</span>`;
                    distDisplay.textContent = totalDistance.toFixed(2);
                }, null, { enableHighAccuracy: true });
                e.target.textContent = "停止測速";
                e.target.classList.add('btn-active');
            }
        };

        document.getElementById('btnToggleMetro').onclick = async (e) => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (timerID) {
                clearTimeout(timerID); timerID = null;
                e.target.textContent = "開始打拍"; e.target.classList.remove('btn-active');
            } else {
                await requestWakeLock();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                nextNoteTime = audioCtx.currentTime;
                
                const scheduler = () => {
                    while (nextNoteTime < audioCtx.currentTime + 0.1) {
                        const osc = audioCtx.createOscillator();
                        const g = audioCtx.createGain();

                        // 調整波形與頻率，增加聲音穿透力
                        osc.type = 'square'; 
                        osc.frequency.setValueAtTime(880, nextNoteTime); 

                        // 明確設定初始音量為 1 (最大)，再快速遞減產生短促音
                        g.gain.setValueAtTime(1, nextNoteTime);
                        g.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.05);

                        osc.connect(g); 
                        g.connect(audioCtx.destination);
                        
                        osc.start(nextNoteTime); 
                        osc.stop(nextNoteTime + 0.05);
                        
                        let displayVal = parseInt(bpmInput.value);
                        let actualBpm = isBikeMode ? displayVal * 2 : displayVal;
                        nextNoteTime += 60.0 / actualBpm;
                    }
                    timerID = setTimeout(scheduler, 25);
                };
                scheduler();
                e.target.textContent = "停止打拍"; e.target.classList.add('btn-active');
            }
        };

        document.getElementById('btnAdd').onclick = () => bpmInput.value = parseInt(bpmInput.value) + 1;
        document.getElementById('btnMinus').onclick = () => bpmInput.value = Math.max(20, bpmInput.value - 1);
        document.getElementById('btnLock').onclick = () => document.getElementById('lockOverlay').style.display = 'flex';
        
        let unlockTimer;
        document.getElementById('btnUnlock').addEventListener('touchstart', (e) => {
            e.preventDefault();
            unlockTimer = setTimeout(() => { document.getElementById('lockOverlay').style.display = 'none'; }, 1500);
        });
        document.getElementById('btnUnlock').addEventListener('touchend', () => clearTimeout(unlockTimer));
    </script>
</body>
</html>
