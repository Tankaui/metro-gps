<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>步頻速度助手</title>
    <style>
        :root {
            --main-bg: #eeeeee;
            --card-bg: #ffffff;
            --text-main: #333333;
            --sub-text: #777777;
            --accent-green: #81c784;
            --accent-blue: #4ba3e3;
            --border-color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background: var(--main-bg);
            margin: 0;
            padding: 8px;
            /* 鎖定畫面不捲動 */
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            color: var(--text-main);
            box-sizing: border-box;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            padding-top: calc(8px + env(safe-area-inset-top));
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5px;
            flex: 0 0 auto;
        }

        h1 { font-size: 1.3em; margin: 0; font-weight: 700; }

        .btn-refresh {
            background: transparent;
            color: var(--sub-text);
            font-size: 0.85em;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
        }

        .box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
        }

        .label-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }

        .label { font-size: 1em; color: var(--sub-text); }

        .mode-toggle {
            font-size: 0.8em;
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--border-color);
            border: none;
            color: var(--text-main);
            font-weight: bold;
        }

        .mode-toggle.active {
            background: var(--accent-blue);
            color: white;
        }

        .data {
            font-size: 4em;
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            line-height: 1;
        }

        .unit { font-size: 0.3em; margin-left: 2px; color: var(--accent-green); }

        .sub-stats { font-size: 1.1em; color: var(--sub-text); margin-bottom: 5px; }
        .stat-highlight { color: var(--text-main); font-weight: bold; }

        .control-group {
            width: 100%;
            margin: 5px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button {
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: var(--border-color);
            color: var(--text-main);
            transition: transform 0.1s;
        }

        .btn-round {
            width: 55px; height: 55px; border-radius: 50%;
            font-size: 2em; display: flex; justify-content: center; align-items: center;
        }

        .btn-main { width: 100%; padding: 15px; margin-top: 5px; }
        .btn-active { background: var(--accent-green) !important; color: white !important; }

        .btn-lock {
            background: var(--text-main);
            color: white;
            width: 100%;
            padding: 16px;
            flex: 0 0 auto;
            border-radius: 12px;
        }

        input[type="number"] {
            font-size: 2em;
            width: 100px;
            height: 55px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: #fff;
            color: var(--text-main);
            font-weight: bold;
        }

        input[type="range"] {
            width: 85%;
            margin: 5px 0 10px 0;
        }

        .freq-label {
            font-size: 0.85em;
            color: var(--sub-text);
            margin-top: 5px;
        }

        #lockOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.96); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 解鎖按鈕的樣式與動畫設定 */
        #btnUnlock { 
            position: relative;
            overflow: hidden;
            width: 160px; height: 160px; border-radius: 80px; 
            background: var(--text-main); border: 4px solid white; 
            font-size: 1.4em; color: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            -webkit-touch-callout: none;
            touch-action: none;
        }

        /* 隱藏的進度填充條 (由下往上) */
        #btnUnlock::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 0%;
            background: var(--accent-green);
            z-index: 0;
            transition: none;
        }

        /* 當按鈕被加上 holding class 時，觸發 1.5 秒的等速填充動畫 */
        #btnUnlock.holding::before {
            height: 100%;
            transition: height 1.5s linear;
        }

        /* 確保文字浮在填充動畫的上方 */
        #btnUnlock span {
            position: relative;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>步頻助手 v25</h1>
        <button class="btn-refresh" id="btnRefresh">歸零</button>
    </div>

    <div class="box">
        <div class="label">目前時速</div>
        <div class="data" id="speedDisplay">0.0<span class="unit">km/h</span></div>
        <div class="sub-stats">里程: <span class="stat-highlight" id="distDisplay">0.00</span> km</div>
        <button id="btnToggleGps" class="btn-main">啟動測速與超速提示</button>
    </div>

    <div class="box">
        <div class="label-row">
            <span class="label" id="metroLabel">一般步頻 (BPM)</span>
            <button class="mode-toggle" id="btnModeToggle">切換自行車</button>
        </div>
        <div class="control-group">
            <button class="btn-round" id="btnMinus">−</button>
            <input type="number" id="bpmInput" value="120" inputmode="numeric">
            <button class="btn-round" id="btnAdd">+</button>
        </div>
        
        <div class="freq-label">音高設定: <span id="freqDisplay" class="stat-highlight">880</span> Hz</div>
        <input type="range" id="freqSlider" min="200" max="2000" step="10" value="880">

        <button id="btnToggleMetro" class="btn-main">開始打拍</button>
    </div>

    <button id="btnLock" class="btn-lock">螢幕休息 (鎖定)</button>

    <div id="lockOverlay" oncontextmenu="return false;">
        <p>鎖定中，按住圓圈</p>
        <button id="btnUnlock" oncontextmenu="return false;"><span>按住喚醒</span></button>
    </div>

    <script>
        let watchId = null, wakeLock = null;
        let audioCtx, timerID = null, nextNoteTime = 0.0;
        let totalDistance = parseFloat(localStorage.getItem('simpleSavedDist')) || 0;
        let lastPosition = null;
        
        // 使用狀態標記來追蹤是否已經處於超速狀態
        let isOverSpeed = false; 
        
        let isBikeMode = false;

        const speedDisplay = document.getElementById('speedDisplay');
        const distDisplay = document.getElementById('distDisplay');
        const bpmInput = document.getElementById('bpmInput');
        const metroLabel = document.getElementById('metroLabel');
        const btnModeToggle = document.getElementById('btnModeToggle');
        
        const freqSlider = document.getElementById('freqSlider');
        const freqDisplay = document.getElementById('freqDisplay');

        distDisplay.textContent = totalDistance.toFixed(2);

        freqSlider.addEventListener('input', (e) => {
            freqDisplay.textContent = e.target.value;
        });

        // 產生多段提示音的函數
        function playBeeps(frequency, duration, repeat, interval) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let startTime = audioCtx.currentTime;
            for (let i = 0; i < repeat; i++) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();

                osc.type = 'square';
                osc.frequency.setValueAtTime(frequency, startTime);

                g.gain.setValueAtTime(1, startTime);
                g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

                osc.connect(g);
                g.connect(audioCtx.destination);
                
                osc.start(startTime);
                osc.stop(startTime + duration);
                
                startTime += interval;
            }
        }

        // 以提示音取代語音報數 (僅播報 >20 與 <=18 的狀態切換)
        function announceSpeed(speed) {
            if (speed > 20 && !isOverSpeed) {
                // 超過 20km 且尚未標記為超速：發出 5 聲高頻急促短音，並切換狀態
                playBeeps(1200, 0.05, 5, 0.1);
                isOverSpeed = true;
            } else if (speed <= 18 && isOverSpeed) {
                // 速度降回 18km 以下且目前為超速狀態：發出 1 聲低沉長音，並解除超速狀態
                playBeeps(300, 0.5, 1, 0);
                isOverSpeed = false;
            }
        }

        btnModeToggle.onclick = () => {
            isBikeMode = !isBikeMode;
            btnModeToggle.classList.toggle('active', isBikeMode);
            if (isBikeMode) {
                metroLabel.textContent = "自行車踏頻 (RPM)";
                btnModeToggle.textContent = "切換一般";
                bpmInput.value = Math.round(parseInt(bpmInput.value) / 2);
            } else {
                metroLabel.textContent = "一般步頻 (BPM)";
                btnModeToggle.textContent = "切換自行車";
                bpmInput.value = Math.round(parseInt(bpmInput.value) * 2);
            }
        };

        document.getElementById('btnRefresh').onclick = () => {
            if(confirm("歸零里程？")) {
                totalDistance = 0;
                localStorage.removeItem('simpleSavedDist');
                distDisplay.textContent = "0.00";
            }
        };

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator && !wakeLock) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        }

        document.getElementById('btnToggleGps').onclick = async (e) => {
            // 初始化並強制解鎖 Web Audio 引擎
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // 播放一段0.001秒的無聲音，確實獲取瀏覽器背景發聲許可
            const unlockOsc = audioCtx.createOscillator();
            const unlockGain = audioCtx.createGain();
            unlockGain.gain.value = 0;
            unlockOsc.connect(unlockGain);
            unlockGain.connect(audioCtx.destination);
            unlockOsc.start();
            unlockOsc.stop(audioCtx.currentTime + 0.001);

            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null; 
                lastPosition = null; 
                isOverSpeed = false; // 停止測速時，將狀態重置
                e.target.textContent = "啟動測速與超速提示";
                e.target.classList.remove('btn-active');
            } else {
                await requestWakeLock();
                watchId = navigator.geolocation.watchPosition((pos) => {
                    let speedKmh = (pos.coords.speed || 0) * 3.6;
                    
                    announceSpeed(speedKmh);

                    if (lastPosition && speedKmh > 1.5) {
                        const R = 6371;
                        const dLat = (pos.coords.latitude - lastPosition.lat) * Math.PI / 180;
                        const dLon = (pos.coords.longitude - lastPosition.lon) * Math.PI / 180;
                        const a = Math.sin(dLat/2)**2 + Math.cos(lastPosition.lat * Math.PI / 180) * Math.cos(pos.coords.latitude * Math.PI / 180) * Math.sin(dLon/2)**2;
                        totalDistance += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        localStorage.setItem('simpleSavedDist', totalDistance);
                    }
                    lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    speedDisplay.innerHTML = `${speedKmh.toFixed(1)}<span class="unit">km/h</span>`;
                    distDisplay.textContent = totalDistance.toFixed(2);
                }, null, { enableHighAccuracy: true });
                e.target.textContent = "停止測速";
                e.target.classList.add('btn-active');
            }
        };

        document.getElementById('btnToggleMetro').onclick = async (e) => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (timerID) {
                clearTimeout(timerID); timerID = null;
                e.target.textContent = "開始打拍"; e.target.classList.remove('btn-active');
            } else {
                await requestWakeLock();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                nextNoteTime = audioCtx.currentTime;
                
                const scheduler = () => {
                    while (nextNoteTime < audioCtx.currentTime + 0.1) {
                        const osc = audioCtx.createOscillator();
                        const g = audioCtx.createGain();

                        osc.type = 'square'; 
                        const currentFreq = parseInt(freqSlider.value);
                        osc.frequency.setValueAtTime(currentFreq, nextNoteTime); 

                        g.gain.setValueAtTime(1, nextNoteTime);
                        g.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.05);

                        osc.connect(g); 
                        g.connect(audioCtx.destination);
                        
                        osc.start(nextNoteTime); 
                        osc.stop(nextNoteTime + 0.05);
                        
                        let displayVal = parseInt(bpmInput.value);
                        let actualBpm = isBikeMode ? displayVal * 2 : displayVal;
                        nextNoteTime += 60.0 / actualBpm;
                    }
                    timerID = setTimeout(scheduler, 25);
                };
                scheduler();
                e.target.textContent = "停止打拍"; e.target.classList.add('btn-active');
            }
        };

        document.getElementById('btnAdd').onclick = () => bpmInput.value = parseInt(bpmInput.value) + 1;
        document.getElementById('btnMinus').onclick = () => bpmInput.value = Math.max(20, bpmInput.value - 1);
        document.getElementById('btnLock').onclick = () => document.getElementById('lockOverlay').style.display = 'flex';
        
        let unlockTimer;
        const btnUnlock = document.getElementById('btnUnlock');
        const btnUnlockText = btnUnlock.querySelector('span');

        btnUnlock.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            btnUnlock.classList.add('holding');
            btnUnlockText.textContent = "解鎖中...";
            unlockTimer = setTimeout(() => { 
                document.getElementById('lockOverlay').style.display = 'none'; 
                btnUnlock.classList.remove('holding');
                btnUnlockText.textContent = "按住喚醒";
            }, 1500);
        }, { passive: false });

        const cancelUnlock = (e) => {
            if(e && e.cancelable) e.preventDefault();
            clearTimeout(unlockTimer);
            btnUnlock.classList.remove('holding');
            btnUnlockText.textContent = "按住喚醒";
        };

        btnUnlock.addEventListener('touchend', cancelUnlock, { passive: false });
        btnUnlock.addEventListener('touchcancel', cancelUnlock, { passive: false });

        btnUnlock.addEventListener('mousedown', (e) => {
            btnUnlock.classList.add('holding');
            btnUnlockText.textContent = "解鎖中...";
            unlockTimer = setTimeout(() => { 
                document.getElementById('lockOverlay').style.display = 'none'; 
                btnUnlock.classList.remove('holding');
                btnUnlockText.textContent = "按住喚醒";
            }, 1500);
        });
        btnUnlock.addEventListener('mouseup', cancelUnlock);
        btnUnlock.addEventListener('mouseleave', cancelUnlock);

    </script>
</body>
</html>
