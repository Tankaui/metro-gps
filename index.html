<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>步頻速度助手</title>
    <style>
        :root {
            --main-bg: #eeeeee;
            --card-bg: #ffffff;
            --text-main: #333333;
            --sub-text: #777777;
            --accent-green: #81c784;
            --accent-blue: #4ba3e3;
            --border-color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background: var(--main-bg);
            margin: 0;
            padding: 8px;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            color: var(--text-main);
            box-sizing: border-box;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            padding-top: calc(8px + env(safe-area-inset-top));
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5px;
            flex: 0 0 auto;
        }

        h1 { font-size: 1.3em; margin: 0; font-weight: 700; }

        .box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
        }

        .label-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }

        .label { font-size: 1em; color: var(--sub-text); }

        .mode-toggle {
            font-size: 0.8em;
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--border-color);
            border: none;
            color: var(--text-main);
            font-weight: bold;
        }

        .mode-toggle.active {
            background: var(--accent-blue);
            color: white;
        }

        .data {
            font-size: 4em;
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            line-height: 1;
        }

        .unit { font-size: 0.3em; margin-left: 2px; color: var(--accent-green); }

        .sub-stats { font-size: 1.1em; color: var(--sub-text); margin-bottom: 5px; }
        .stat-highlight { color: var(--text-main); font-weight: bold; }

        .control-group {
            width: 100%;
            margin: 5px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button {
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: var(--border-color);
            color: var(--text-main);
            transition: transform 0.1s;
        }

        .btn-round {
            width: 55px; height: 55px; border-radius: 50%;
            font-size: 2em; display: flex; justify-content: center; align-items: center;
        }

        .btn-main { width: 100%; padding: 15px; margin-top: 5px; }
        .btn-active { background: var(--accent-green) !important; color: white !important; }

        .btn-lock {
            background: var(--text-main);
            color: white;
            width: 100%;
            padding: 16px;
            flex: 0 0 auto;
            border-radius: 12px;
        }

        input[type="number"] {
            font-size: 2em;
            width: 100px;
            height: 55px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: #fff;
            color: var(--text-main);
            font-weight: bold;
        }

        input[type="range"] {
            width: 85%;
            margin: 5px 0 10px 0;
        }

        .freq-label {
            font-size: 0.85em;
            color: var(--sub-text);
            margin-top: 5px;
        }

        #lockOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.98); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #btnUnlock { 
            position: relative;
            overflow: hidden;
            width: 160px; height: 160px; border-radius: 80px; 
            background: var(--text-main); border: 4px solid white; 
            font-size: 1.4em; color: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            -webkit-touch-callout: none;
            touch-action: none;
        }

        #btnUnlock::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 0%;
            background: var(--accent-green);
            z-index: 0;
            transition: none;
        }

        #btnUnlock.holding::before {
            height: 100%;
            transition: height 1.5s linear;
        }

        #btnUnlock span {
            position: relative;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>步頻助手 v28</h1>
    </div>

    <div class="box">
        <div class="label">目前時速</div>
        <div class="data" id="speedDisplay" style="margin-bottom: 10px;">0.0<span class="unit">km/h</span></div>
        <div class="freq-label" style="margin-bottom: 8px; line-height: 1.3;">⚠️ 網頁版 GPS 易受干擾。<br>請保持螢幕長亮，勿退至背景或鎖定設備。</div>
        <button id="btnToggleGps" class="btn-main">啟動測速與超速提示</button>
    </div>

    <div class="box">
        <div class="label-row">
            <span class="label" id="metroLabel">一般步頻 (BPM)</span>
            <button class="mode-toggle" id="btnModeToggle">切換自行車</button>
        </div>
        <div class="control-group">
            <button class="btn-round" id="btnMinus">−</button>
            <input type="number" id="bpmInput" value="120" inputmode="numeric">
            <button class="btn-round" id="btnAdd">+</button>
        </div>
        
        <div class="freq-label">音高設定: <span id="freqDisplay" class="stat-highlight">880</span> Hz</div>
        <input type="range" id="freqSlider" min="200" max="2000" step="10" value="880">

        <button id="btnToggleMetro" class="btn-main">開始打拍</button>
    </div>

    <button id="btnLock" class="btn-lock">螢幕休息 (鎖定)</button>

    <div id="lockOverlay" oncontextmenu="return false;">
        <div id="lockSpeedDisplay" style="font-size: 6em; font-weight: 800; color: white; margin-bottom: 40px; line-height: 1;">0.0<span style="font-size: 0.3em; color: var(--accent-green); margin-left: 5px;">km/h</span></div>
        <p style="color: var(--sub-text); margin-bottom: 15px;">鎖定中，按住圓圈</p>
        <button id="btnUnlock" oncontextmenu="return false;"><span>按住喚醒</span></button>
    </div>

    <script>
        let watchId = null, wakeLock = null;
        let audioCtx, timerID = null, nextNoteTime = 0.0;
        let lastPosition = null;
        let lastValidTime = 0;
        let isOverSpeed = false; 
        let isBikeMode = false;
        
        let isAppActive = false; 

        const speedDisplay = document.getElementById('speedDisplay');
        const lockSpeedDisplay = document.getElementById('lockSpeedDisplay');
        const bpmInput = document.getElementById('bpmInput');
        const metroLabel = document.getElementById('metroLabel');
        const btnModeToggle = document.getElementById('btnModeToggle');
        const freqSlider = document.getElementById('freqSlider');
        const freqDisplay = document.getElementById('freqDisplay');

        freqSlider.addEventListener('input', (e) => {
            freqDisplay.textContent = e.target.value;
        });

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    if (wakeLock !== null) {
                        await wakeLock.release();
                        wakeLock = null;
                    }
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.warn('Wake Lock 失敗: 可能是處於省電模式，或並非 HTTPS 環境。');
                }
            }
        }

        function checkAppStatus() {
            if (!watchId && !timerID) {
                isAppActive = false;
                if (wakeLock !== null) {
                    wakeLock.release().then(() => { wakeLock = null; });
                }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && isAppActive) {
                await requestWakeLock();
            }
        });

        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.001);
        }

        function playBeeps(frequency, duration, repeat, interval) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            
            let startTime = audioCtx.currentTime;
            for (let i = 0; i < repeat; i++) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();

                osc.type = 'square';
                osc.frequency.setValueAtTime(frequency, startTime);

                g.gain.setValueAtTime(1, startTime);
                g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

                osc.connect(g);
                g.connect(audioCtx.destination);
                
                osc.start(startTime);
                osc.stop(startTime + duration);
                
                startTime += interval;
            }
        }

        function announceSpeed(speed) {
            if (speed > 20 && !isOverSpeed) {
                playBeeps(1200, 0.05, 5, 0.1);
                isOverSpeed = true;
            } else if (speed <= 18 && isOverSpeed) {
                playBeeps(300, 0.5, 1, 0);
                isOverSpeed = false;
            }
        }

        btnModeToggle.onclick = () => {
            isBikeMode = !isBikeMode;
            btnModeToggle.classList.toggle('active', isBikeMode);
            if (isBikeMode) {
                metroLabel.textContent = "自行車踏頻 (RPM)";
                btnModeToggle.textContent = "切換一般";
                bpmInput.value = Math.round(parseInt(bpmInput.value) / 2);
            } else {
                metroLabel.textContent = "一般步頻 (BPM)";
                btnModeToggle.textContent = "切換自行車";
                bpmInput.value = Math.round(parseInt(bpmInput.value) * 2);
            }
        };

        document.getElementById('btnToggleGps').onclick = async (e) => {
            unlockAudio();

            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null; 
                lastPosition = null; 
                lastValidTime = 0;
                isOverSpeed = false; 
                e.target.textContent = "啟動測速與超速提示";
                e.target.classList.remove('btn-active');
                checkAppStatus(); 
            } else {
                isAppActive = true;
                await requestWakeLock(); 
                
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const currentAcc = pos.coords.accuracy;
                    const currentTime = pos.timestamp;

                    if (currentAcc > 25) return;
                    if (lastValidTime && (currentTime - lastValidTime < 800)) return;

                    let speedKmh = (pos.coords.speed || 0) * 3.6;
                    announceSpeed(speedKmh);

                    if (lastPosition) {
                        const R = 6371;
                        const dLat = (pos.coords.latitude - lastPosition.lat) * Math.PI / 180;
                        const dLon = (pos.coords.longitude - lastPosition.lon) * Math.PI / 180;
                        const a = Math.sin(dLat/2)**2 + Math.cos(lastPosition.lat * Math.PI / 180) * Math.cos(pos.coords.latitude * Math.PI / 180) * Math.sin(dLon/2)**2;
                        const distance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 

                        const timeDiffSec = (currentTime - lastValidTime) / 1000;
                        const calcSpeedKmh = (distance / timeDiffSec) * 3600;

                        // 仍然保留距離計算，僅用於防呆過濾，不作加總顯示
                        if (distance > 0.002 && calcSpeedKmh < 80) {
                            if (!pos.coords.speed && timeDiffSec > 0) speedKmh = calcSpeedKmh;
                            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                            lastValidTime = currentTime;
                        }
                    } else {
                        lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                        lastValidTime = currentTime;
                    }

                    // 同步更新主畫面與鎖定畫面的速度顯示
                    const speedHtml = `${speedKmh.toFixed(1)}<span class="unit">km/h</span>`;
                    const lockSpeedHtml = `${speedKmh.toFixed(1)}<span style="font-size: 0.3em; color: var(--accent-green); margin-left: 5px;">km/h</span>`;
                    
                    speedDisplay.innerHTML = speedHtml;
                    lockSpeedDisplay.innerHTML = lockSpeedHtml;
                    
                }, (error) => {
                    console.warn("GPS 異常:", error.message);
                }, { 
                    enableHighAccuracy: true, 
                    maximumAge: 0, 
                    timeout: 5000 
                });
                
                e.target.textContent = "停止測速";
                e.target.classList.add('btn-active');
            }
        };

        document.getElementById('btnToggleMetro').onclick = async (e) => {
            unlockAudio();

            if (timerID) {
                clearTimeout(timerID); timerID = null;
                e.target.textContent = "開始打拍"; e.target.classList.remove('btn-active');
                checkAppStatus(); 
            } else {
                isAppActive = true;
                await requestWakeLock(); 
                
                nextNoteTime = audioCtx.currentTime;
                
                const scheduler = () => {
                    while (nextNoteTime < audioCtx.currentTime + 0.1) {
                        const osc = audioCtx.createOscillator();
                        const g = audioCtx.createGain();

                        osc.type = 'square'; 
                        const currentFreq = parseInt(freqSlider.value);
                        osc.frequency.setValueAtTime(currentFreq, nextNoteTime); 

                        g.gain.setValueAtTime(1, nextNoteTime);
                        g.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.05);

                        osc.connect(g); 
                        g.connect(audioCtx.destination);
                        
                        osc.start(nextNoteTime); 
                        osc.stop(nextNoteTime + 0.05);
                        
                        let displayVal = parseInt(bpmInput.value);
                        let actualBpm = isBikeMode ? displayVal * 2 : displayVal;
                        nextNoteTime += 60.0 / actualBpm;
                    }
                    timerID = setTimeout(scheduler, 25);
                };
                scheduler();
                e.target.textContent = "停止打拍"; e.target.classList.add('btn-active');
            }
        };

        document.getElementById('btnAdd').onclick = () => bpmInput.value = parseInt(bpmInput.value) + 1;
        document.getElementById('btnMinus').onclick = () => bpmInput.value = Math.max(20, bpmInput.value - 1);
        document.getElementById('btnLock').onclick = () => document.getElementById('lockOverlay').style.display = 'flex';
        
        let unlockTimer;
        const btnUnlock = document.getElementById('btnUnlock');
        const btnUnlockText = btnUnlock.querySelector('span');

        btnUnlock.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            btnUnlock.classList.add('holding');
            btnUnlockText.textContent = "解鎖中...";
            unlockTimer = setTimeout(() => { 
                document.getElementById('lockOverlay').style.display = 'none'; 
                btnUnlock.classList.remove('holding');
                btnUnlockText.textContent = "按住喚醒";
            }, 1500);
        }, { passive: false });

        const cancelUnlock = (e) => {
            if(e && e.cancelable) e.preventDefault();
            clearTimeout(unlockTimer);
            btnUnlock.classList.remove('holding');
            btnUnlockText.textContent = "按住喚醒";
        };

        btnUnlock.addEventListener('touchend', cancelUnlock, { passive: false });
        btnUnlock.addEventListener('touchcancel', cancelUnlock, { passive: false });

        btnUnlock.addEventListener('mousedown', (e) => {
            btnUnlock.classList.add('holding');
            btnUnlockText.textContent = "解鎖中...";
            unlockTimer = setTimeout(() => { 
                document.getElementById('lockOverlay').style.display = 'none'; 
                btnUnlock.classList.remove('holding');
                btnUnlockText.textContent = "按住喚醒";
            }, 1500);
        });
        btnUnlock.addEventListener('mouseup', cancelUnlock);
        btnUnlock.addEventListener('mouseleave', cancelUnlock);

    </script>
</body>
</html>
